[models]
asr_model_path = "models/Qwen3-ASR-1.7B"
forced_aligner_path = "models/Qwen3-ForcedAligner-0.6B"
# ASR 推理后端："transformers"（默认）或 "vllm"（需 pip install qwen-asr[vllm]）
# 注意：强制对齐（ForcedAligner）始终使用 transformers，不受此项影响
backend = "transformers"

[perception]
segmentation_mode = "punctuation"
split_pause_threshold = 0.20
silence_threshold = 0.80
max_chars = 60
sentence_endings = ["。","！","？","；","\n","，",",",".","!","?",";",":","：","—","…","、","（","）","(",")","“","”","\"","'","《","》"]

# Layer3：keep 段右边界 = 末句 t_end + min(gap_after, gap_after_cap)
# VAD 切点吸附：命令行 --no-vad-snap 时忽略本节 VAD 项
[execution]
gap_after_cap = 0.6
vad_snap_enabled = true
vad_snap_radius = 0.12
vad_threshold = 0.35
vad_min_silence_ms = 80
vad_speech_pad_ms = 10
# L1A 后 L1B 与 L2 双轨并行（false 时恢复为仅串行 L2；CLI 可用 --no-parallel-l1b-l2 覆盖）
parallel_l1b_l2_enabled = true

# DeepSeek V4：阶段化 LLM 参数；未在 stages 中指定的字段继承 [llm.default]
[llm]
api_key = "YOUR_DEEPSEEK_API_KEY"
base_url = "https://api.deepseek.com"

[llm.default]
model = "deepseek-v4-flash"
thinking = false
reasoning_effort = "high"
temperature = 0.3
max_tokens = 65536

# 2a Round 1：粗理解 + ASR 误识候选
[llm.stages.r1]
thinking = false
temperature = 0.5

# 2a Round 2：精化主旨 + 纠错
[llm.stages.r2]
thinking = false
temperature = 0.2

# 2b：逐句 keep/cut 决策
[llm.stages.decision]
model = "deepseek-v4-pro"
thinking = true
reasoning_effort = "high"
temperature = 0.2

# 2c：审核校验
[llm.stages.review]
thinking = true
reasoning_effort = "high"
temperature = 0.2

# 轻量布尔判断（如 2d 回流）
[llm.stages.light]
thinking = false
temperature = 0.1

# 智能层
[intelligence]
# 2b 模式："single"（全文一次调用）或 "block"（每个 outline 块一次调用，不二次拆分）
two_b_mode = "single"
# block 模式下，单块句数超过此值时记录警告（0 = 不限制/不警告；正整数 = chat 模型兜底阈值）
two_b_block_size_limit = 0
# 2c 审核：最大修正轮次（0=占位透传，1=审核+最多1轮修正，2=最多2轮修正）
two_c_max_review_rounds = 1
# 2c 审核：must 项通过率阈值（1.0=全部 must 必须通过才 pass）
two_c_must_pass_rate = 1.0
# 2d 人工审阅：最大回流次数（0=禁用回流，仅手动 toggle + 确认）
two_d_max_reflows = 3
